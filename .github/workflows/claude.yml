name: Claude Code

on:
  issues:
    types: [ opened ]
  issue_comment:
    types: [ created ]
  pull_request_review_comment:
    types: [ created ]
  pull_request_review:
    types: [ submitted ]

jobs:
  auto-resolve-issue:
    if: |
      (
        (github.event_name == 'issues' &&
          github.event.issue.user.login == github.repository_owner) ||
        (github.event_name == 'issue_comment' &&
          !github.event.issue.pull_request &&
          contains(github.event.comment.body, '@claude') &&
          github.event.comment.user.login == github.repository_owner)
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --permission-mode bypassPermissions
          prompt: |
            Issue #${{ github.event.issue.number }} needs attention: "${{ github.event.issue.title }}".

            Body:
            ${{ github.event.issue.body }}

            Read the full issue thread (including any later comments) before acting — this
            may be a re-trigger from a follow-up comment rather than a newly opened issue.

            1. Investigate the repository to understand the context.
            2. If the issue is actionable, implement the fix/feature on a new branch and open a PR
               whose body includes "Closes #${{ github.event.issue.number }}".
            3. Apply the `claude` label to the PR so follow-up automation can find it.
            4. If the issue is too vague, ambiguous, or not actionable, post a comment on the
               issue asking for clarification and do not open a PR.

  pr-follow-up:
    if: |
      github.event.sender.login == github.repository_owner && (
        (github.event_name == 'issue_comment' && github.event.issue.pull_request &&
          contains(github.event.issue.labels.*.name, 'claude')) ||
        (github.event_name == 'pull_request_review_comment' &&
          contains(github.event.pull_request.labels.*.name, 'claude')) ||
        (github.event_name == 'pull_request_review' &&
          contains(github.event.pull_request.labels.*.name, 'claude'))
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --permission-mode bypassPermissions
          prompt: |
            You authored this PR. A new comment or review was just posted. Read the full PR
            conversation, then either:
              - push a commit to the PR branch addressing the feedback, or
              - reply in-thread explaining your reasoning / asking for clarification.

            Do not engage if the commenter is a bot.
